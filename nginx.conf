server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;

  # Enable gzip compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json image/svg+xml;

  # Strip trailing slashes — Next.js uses trailingSlash: false,
  # so /zh/ should redirect to /zh (which resolves to zh.html).
  # Without this, nginx tries to serve the directory and returns 403.
  location ~ ^(.+)/$ {
      return 301 $1;
  }

  # Static assets with content hash — long cache (1 year)
  location /_next/static/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Cache-Status "HIT-STATIC";
      try_files $uri =404;
  }

  # CSS and JS files — long cache
  location ~* \.(css|js)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Cache-Status "HIT-ASSETS";
      try_files $uri =404;
  }

  # Image assets — 7 days cache with different strategies
  location ~* \.(jpg|jpeg|png|gif|webp|avif|svg|ico)$ {
      add_header Cache-Control "public, max-age=604800, stale-while-revalidate=2592000";
      add_header X-Cache-Status "HIT-IMAGE";
      try_files $uri =404;
  }

  # Image directory — 1 day cache
  location /images/ {
      add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800";
      add_header X-Cache-Status "HIT-IMAGE-DIR";
      try_files $uri =404;
  }

  # Video and audio — 30 days cache
  location ~* \.(mp4|webm|ogg|mp3|wav|flac)$ {
      add_header Cache-Control "public, max-age=2592000";
      add_header X-Cache-Status "HIT-MEDIA";
      try_files $uri =404;
  }

  # Fonts — long cache
  location ~* \.(woff|woff2|ttf|otf|eot)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Cache-Status "HIT-FONT";
      try_files $uri =404;
  }

  # Fonts directory — long cache
  location /fonts/ {
      add_header Cache-Control "public, max-age=31536000, immutable";
      add_header X-Cache-Status "HIT-FONT-DIR";
      try_files $uri =404;
  }

  # JSON and XML data files — 1 hour cache
  location ~* \.(json|xml)$ {
      add_header Cache-Control "public, max-age=3600";
      add_header X-Cache-Status "HIT-DATA";
      try_files $uri =404;
  }

  # HTML pages — 1 hour cache
  location / {
      add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
      add_header X-Cache-Status "HIT-HTML";
      try_files $uri $uri.html $uri/ =404;
  }

  # This is necessary when `trailingSlash: false`.
  # You can omit this when `trailingSlash: true`.
  location /blog/ {
      add_header Cache-Control "public, max-age=3600, stale-while-revalidate=86400";
      add_header X-Cache-Status "HIT-BLOG";
      rewrite ^/blog/(.*)$ /blog/$1.html break;
  }

  error_page 404 /404.html;
  location = /404.html {
      internal;
  }
}